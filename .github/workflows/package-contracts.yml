name: Pack RevitApi.Contracts

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish
        required: true
        default: 0.1.3
  push:
    tags:
      - "v*"
      - "revitapi-contracts-v*"

permissions:
  contents: read
  packages: write

jobs:
  pack:
    runs-on: ubuntu-latest
    env:
      GITHUB_PACKAGES_SOURCE: https://nuget.pkg.github.com/Thomash100/index.json
      GITHUB_PACKAGES_TOKEN: ${{ secrets.CONTRACTS_PACKAGES_TOKEN || github.token }}
      HAS_CONTRACTS_PACKAGES_TOKEN: ${{ secrets.CONTRACTS_PACKAGES_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.package_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
            $version = $version -replace '^revitapi-contracts-v', ''
            $version = $version -replace '^v', ''
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        run: dotnet restore RevitApi.Contracts.sln

      - name: Build
        run: dotnet build RevitApi.Contracts.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/RevitApi.Contracts.Tests/RevitApi.Contracts.Tests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/RevitApi.Contracts/RevitApi.Contracts.csproj --configuration Release --no-build -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts/packages

      - name: Configure GitHub Packages source
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_PACKAGES_TOKEN)) {
            throw "No GitHub Packages token available. Configure CONTRACTS_PACKAGES_TOKEN with write:packages or grant GITHUB_TOKEN package publish access."
          }

          if ($env:HAS_CONTRACTS_PACKAGES_TOKEN -eq "true") {
            Write-Host "Using CONTRACTS_PACKAGES_TOKEN for GitHub Packages publish."
          }
          else {
            Write-Host "Using GITHUB_TOKEN fallback for GitHub Packages publish."
          }

          dotnet nuget remove source github-thomash100 2>$null
          dotnet nuget add source $env:GITHUB_PACKAGES_SOURCE `
            --name github-thomash100 `
            --username $env:GITHUB_ACTOR `
            --password $env:GITHUB_PACKAGES_TOKEN `
            --store-password-in-clear-text

      - name: Publish to GitHub Packages
        shell: pwsh
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "github-thomash100" --api-key "$env:GITHUB_PACKAGES_TOKEN" --skip-duplicate
