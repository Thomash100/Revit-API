name: Pack RevitApi.Contracts

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish
        required: true
        default: 0.1.1
  push:
    tags:
      - "v*"
      - "revitapi-contracts-v*"

permissions:
  contents: read
  packages: write

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.package_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
            $version = $version -replace '^revitapi-contracts-v', ''
            $version = $version -replace '^v', ''
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        run: dotnet restore RevitApi.Contracts.sln

      - name: Build
        run: dotnet build RevitApi.Contracts.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/RevitApi.Contracts.Tests/RevitApi.Contracts.Tests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/RevitApi.Contracts/RevitApi.Contracts.csproj --configuration Release --no-build -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts/packages

      - name: Publish to GitHub Packages
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/Thomash100/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
